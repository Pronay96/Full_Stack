<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assesment Test HTML LEVEL 2</title>
</head>
<body>
    <form action="" method="get">
        <h1>Course Sign Up Page</h1>
        <p>Please Note: First Name, Last Name, Password, and Email are required</p>

        <label for="f_name">First Name:</label>
        <input type="text" name="First Name" id="f_name" placeholder="First Name" required>
        <label for="l_name">Last Name:</label>
        <input type="text" name="Last Name" id="l_name" placeholder="Last Name" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" name="emailid" id="email" placeholder="name@email.com">
        <label for="passwd">Password:</label>
        <input type="password" name="passwd" id="passwd">
        
        <p>Are you over the age of 18?</p>
        <label for="yes">Yes: </label>
        <input type="radio" name="Age" id="yes">
        <label for="no">No: </label>
        <input type="radio" name="Age" id="no">

        <p>Do you have a Credit Card or PayPal?</p>
        <select name="" id="">
            <option value="credit">Credit Card</option>
            <option value="upi">PayPal</option>
        </select>
        <br><br>

        <input type="submit" value="Submit Feedback">

    </form>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Labels</title>
</head>
<body>
    <form action="https://www.google.com/" target="_blank" method="post">
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" name="" placeholder="First Name" required>
        <br><br>
        <label for="middlename">Middle Name:</label>
        <input type="text" id="middlename" name="" placeholder="Middle Name">
        <br><br>
        <label for="lastname">Last Name:</label>
        <input type="text", id="lastname" name="" placeholder="Last Name" required>
        <br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Action/Method and label Attributes</title>
</head>
<body>
    <form action="http://www.facebook.com" target="_blank" method="get">
        <h1>Login Page</h1>
        <p>Enter your email:</p>
        <input type="email" name="useremail" placeholder="Enter email here">
        <input type="submit" value="Submit">
    </form>
</body>
</html>

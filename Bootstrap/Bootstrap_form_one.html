<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
    <style>
        .bg-gradient-custom {
            background: linear-gradient(45deg, #3502ec 0%, #ffffff 50%, #3502ec 100%);
        }

        .form-check-input:checked {
            background-color: black;
            border-color: white;
        }
    </style>
    <div class="container m-3 p-3 rounded bg-gradient-custom">
        <form action="">
            <fieldset>
                <legend class="text-center mb-4">Login Form</legend>
                <div class="mb-3">
                    <label for="inputname" class="form-label">Full Name:</label>
                    <input type="text" id="inputname" class="form-control" aria-describedby="namehelp"
                        placeholder="Enter your full name here">
                    <div id="namehelp" class="form-text">Please enter your full name in capital.</div>
                </div>
                <div class="mb-3">
                    <label for="imputemail" class="form-label">Email Address:</label>
                    <input type="email" id="inputemail" class="form-control" aria-describedby="emailhelp"
                        placeholder="Enter valid email here">
                    <div id="emailhelp" class="form-text">Your email is secure.</div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" id="password" class="form-control" aria-describedby="passwordhelp"
                        placeholder="Enter correct password">
                    <div id="passwordhelp" class="form-text">Do not share your password.</div>
                </div>
                <div class="mb-3" class="form-check">
                    <input type="checkbox" id="checkbox" class="form-check-input">
                    <label for="checkbox" class="form-check-label">Agree to terms & conditions</label>
                </div>
                <div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </fieldset>
        </form>
    </div>
</body>

</html>

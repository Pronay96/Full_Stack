<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Buttons</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

    <div class="container">
        <!-- Base Button Class -->
        <button type="button" class="btn">Base Button Class</button>
        
        <br><br>

        <!-- Contextual Variations -->
        <button type="button" class="btn btn-primary">Primary</button>
        <button type="button" class="btn btn-secondary">Secondary</button>
        <button type="button" class="btn btn-success">Success</button>
        <button type="button" class="btn btn-danger">Danger</button>
        <button type="button" class="btn btn-warning">Warning</button>
        <button type="button" class="btn btn-info">Info</button>
        <button type="button" class="btn btn-light">Light</button>
        <button type="button" class="btn btn-dark">Dark</button>

        <button type="button" class="btn btn-link">Link</button>
        
        <br><br>
        
        <!-- Text Wrap -->
        <button class="btn btn-primary text-wrap w-25" style="width: 100px;">
            This is a long text inside a Bootstrap button
        </button>
        <button class="btn btn-primary text-nowrap" style="width: 100px;">
            This is a long text inside a Bootstrap button
        </button>

        <br><br>

        <!-- Button tag with the anchor element -->
        <a class="btn btn-primary" href="https://www.google.com" role="button">Link to Google</a>

        <br><br>

        <!-- Outline Buttons -->
        <button type="button" class="btn btn-outline-primary">Primary</button>
        <button type="button" class="btn btn-outline-secondary">Secondary</button>
        <button type="button" class="btn btn-outline-success">Success</button>
        <button type="button" class="btn btn-outline-warning">Warning</button>

        <br><br>

        <!-- Button Sizes -->
        <button type="button" class="btn btn-primary btn-lg">Large Button</button>
        <button type="button" class="btn btn-primary btn-sm">Small Button</button>
        <button type="button" class="btn btn-info" style="--bs-btn-padding-y: .3rem; --bs-btn-padding-x: .5rem; --bs-btn-font-size: .7rem;">Custom Button</button>

        <br><br>

        <!-- Disabled Button State -->
        <button type="button" class="btn btn-primary" disabled>Primary button</button>
        <button type="button" class="btn btn-secondary" disabled>Button</button>
        <button type="button" class="btn btn-outline-primary" disabled>Primary button</button>
        <button type="button" class="btn btn-outline-secondary" disabled>Button</button>
        
        <br><br>

        <!-- Disabled button with anchor tag -->
        <a class="btn btn-primary disabled" role="button" aria-disabled="true">Primary link</a>
        <a class="btn btn-secondary disabled" role="button" aria-disabled="true">Link</a>

    </div>

</body>
</html>
